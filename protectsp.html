<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <title>Chính sách đổi trả - ChonGame</title>
</head>

<body>

    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <p style="width: 100%;height: 70px; background-color: #f5f5f5;"></p>

    <div id="footer-placeholder"></div>

    <p style="width: 100%;height: 465px; background-color: #f5f5f5;"></p>

    <script>
        // Hàm dùng để load file HTML vào một ID cụ thể
        function loadComponent(id, file) {
            fetch(file)
                .then(response => {
                    if (response.ok) return response.text();
                    throw new Error('Không tìm thấy file: ' + file);
                })
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                })
                .catch(error => console.error(error));
        }

        // Gọi nạp dữ liệu
        loadComponent('header-placeholder', 'header.html');
        loadComponent('footer-placeholder', 'footer.html');
        loadComponent('sidebar-placeholder', 'sidebar.html');
    </script>

    <script src="home.js"></script>

</body>

</html>
