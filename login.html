<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ChonGame</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <div class="container-page-login">
        <div class="page-login">
            <h2>ĐĂNG NHẬP</h2>
            <form>
                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" placeholder="Tên đăng nhập" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" placeholder="Mật khẩu" required>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Ghi nhớ</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login">ĐĂNG NHẬP</button>

                <p class="register-link">Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a></p>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Hàm dùng để load file HTML vào một ID cụ thể
        function loadComponent(id, file) {
            fetch(file)
                .then(response => {
                    if (response.ok) return response.text();
                    throw new Error('Không tìm thấy file: ' + file);
                })
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                })
                .catch(error => console.error(error));
        }

        // Gọi nạp dữ liệu
        loadComponent('header-placeholder', 'header.html');
        loadComponent('footer-placeholder', 'footer.html');
        loadComponent('sidebar-placeholder', 'sidebar.html');
    </script>

    <script src="home.js"></script>
</body>

</html>
